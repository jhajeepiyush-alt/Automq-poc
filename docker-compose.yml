services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    volumes:
      - minio-data:/data

    networks:
      - automq-net

volumes:
  minio-data:

networks:
  automq-net:
    external: true
